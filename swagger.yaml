  /policies/{policyId}/blocks:
    get:
      description: >-
        Returns data from the root policy block. Users with permission to
        execute or manage the policy can make this request. If the root block is
        not available to the caller at the current policy stage or time, the
        request may fail.
      operationId: PolicyApi_getPolicyBlocks
      parameters:
        - name: policyId
          required: true
          in: path
          description: Policy Id
          schema:
            example: 69aeb71ef8c5b278e3bab4e5
            type: string
        - name: savepointIds
          required: false
          in: query
          description: >-
            Optional. Savepoint ids (JSON array or stringified JSON). Parsed and
            passed with the rest of the query object to the engine.
          schema:
            example: '["69c2cfc021d39e7b6d15e236"]'
            type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockDTO'
              example:
                id: f3b2a9c1e4d5678901234567
                blockType: string
                blocks:
                  - {}
        '401':
          description: Unauthorized request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorDTO'
              example:
                statusCode: 401
                message: Unauthorized request
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorDTO'
              example:
                message: Forbidden resource
                error: Forbidden
                statusCode: 403
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorDTO'
              example:
                statusCode: 500
                message: Error message
        '503':
          description: Block Unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableErrorDTO'
              example:
                statusCode: 503
                message: Error message
      security:
        - bearer: []
      summary: Retrieves data for the policy root block.
      tags:
        - policies
  /policies/{policyId}/blocks/{uuid}:
    get:
      description: >-
        Returns the block payload for the specified UUID. Within a policy,
        different roles may see different blocks at different stages or moments
        of the workflow. If the requested block is not available to the caller’s
        role at this time, the API responds with `422 Unprocessable Entity` and
        `message: "Block Unavailable"` (see response example).
      operationId: PolicyApi_getBlockData
      parameters:
        - name: policyId
          required: true
          in: path
          description: Policy Id
          schema:
            example: 69aeb71ef8c5b278e3bab4e5
            type: string
        - name: uuid
          required: true
          in: path
          description: Block Identifier
          schema:
            example: 9db028d2-03ad-4d49-a178-cf4b67f8c147
            type: string
        - name: savepointIds
          required: false
          in: query
          description: >-
            Optional. Savepoint ids (JSON array or stringified JSON). Parsed and
            passed with the rest of the query object to the engine.
          schema:
            example: '["69c2cfc021d39e7b6d15e236"]'
            type: string
      responses:
