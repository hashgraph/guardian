        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorDTO'
              example:
                statusCode: 500
                message: Error message
      security:
        - bearer: []
      summary: Delete dry-run savepoints.
      tags:
        - policies
