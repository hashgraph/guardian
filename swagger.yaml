      description: >-
        Builds and returns a trustchain, from the VP to the root VC document.
        Only users with the Standard Registry role are allowed to make the
        request.
      operationId: TrustChainsApi_getTrustChainByHash
      parameters:
        - name: hash
          required: true
          in: path
          description: VP document hash used to build the trust chain
          schema:
            example: GcDE9NsPJc7oCZvSVJySCZHxTxvjc3ZAMgtKozP1r1Eh
            type: string
      responses:
        '200':
          description: Successful operation. Returns the trust chain and user map.
          content:
            application/json:
              schema:
                type: object
                properties:
                  chain:
                    type: array
                    description: >-
                      Ordered array of documents forming the trust chain (from
                      VP to root VC)
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Document ID or DID
                        type:
                          type: string
                          description: Document type (VC, VP, DID)
                        tag:
                          type: string
                          description: Policy block tag
                        label:
                          type: string
                          description: Human-readable label
                        schema:
                          type: string
                          description: Schema identifier
                        owner:
                          type: string
                          description: Document owner DID
                        document:
                          type: object
                          description: Raw document content
                      required:
                        - id
                        - type
                        - tag
                        - label
                        - schema
                        - owner
                        - document
                  userMap:
                    type: array
                    description: >-
                      Mapping of DIDs to usernames for all users in the trust
                      chain
                    items:
                      type: object
                      properties:
                        did:
                          type: string
                          description: User DID
                        username:
                          type: string
                          description: Username
                      required:
                        - did
                        - username
                required:
                  - chain
                  - userMap
              examples:
                default:
