  /accounts/push/onboard:
    post:
      description: >-
        Creates a user account, Hedera account, DID, and cryptographic keys on
        behalf of the user. If hederaAccountId / hederaAccountKey are omitted
        the platform generates them. 
      operationId: AccountApi_registerAndOnboard
      parameters: []
      requestBody:
        required: true
        description: Registration and optional Hedera / DID credentials.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingDTO'
      responses:
        '202':
          description: Task created — poll for completion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDTO'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorDTO'
      summary: Registers and fully onboards a new user account.
      tags:
        - accounts
