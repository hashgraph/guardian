  /schemas:
    get:
      description: >-
        Returns all schemas. Add Api-Version: 2 header to use search and
        searchOptions filters. If `category` is omitted, the endpoint returns
        schemas of all categories matching the standard
        owner/non-system/non-readonly filters. Published tool schemas that do
        not match the current owner are only included when `category=TOOL`.
      operationId: SchemaApi_getSchemasPageV2
      parameters:
        - name: pageIndex
          required: false
          in: query
          description: >-
            The number of pages to skip before starting to collect the result
            set
          schema:
            example: 0
            type: number
        - name: pageSize
          required: false
          in: query
          description: The numbers of items to return
          schema:
            example: 20
            type: number
        - name: category
          required: false
          in: query
          description: >-
            Schema category. If omitted, schemas of all categories matching the
            standard owner/non-system/non-readonly filters are returned.
            Published tool schemas without owner match are only included when
            `category=TOOL`.
          schema:
            enum:
              - POLICY
              - MODULE
              - SYSTEM
              - TAG
              - TOOL
              - STATISTIC
              - LABEL
            type: string
        - name: policyId
          required: false
          in: query
          description: Policy id
          schema:
            example: 69aeb71ef8c5b278e3bab4e5
            type: string
        - name: moduleId
          required: false
          in: query
          description: Module id
          schema:
            example: 69aeb71ef8c5b278e3bab4e5
            type: string
        - name: toolId
          required: false
          in: query
          description: Tool id
          schema:
            example: 69aeb71ef8c5b278e3bab4e5
            type: string
        - name: topicId
          required: false
          in: query
          description: >-
            Topic id. Use `not-binded` to return policy schemas not bound to any
            policy topic.
          schema:
            example: 0.0.6046379
            type: string
        - name: search
          required: false
          in: query
          description: Search
          schema:
            example: text
            type: string
        - name: searchOptions
          required: false
          in: query
          description: >-
            Search scopes. `uuid` searches by schema IRI, `name` by schema name,
            `description` by schema description, `references` by `$defs`, and
            `fields` by schema document fields excluding `$defs`. Supports
            repeated query params or comma-separated values. If omitted, search
            is performed across all scopes.
          schema:
            type: array
            items:
              type: string
              enum:
                - uuid
                - name
                - description
                - references
                - fields
      responses:
        '200':
          description: Successful operation.
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: Total items in the collection.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SchemaDTO'
              example:
                - id: f3b2a9c1e4d5678901234567
