  /profiles/push/{username}:
    put:
      description: >-
        Applies to the **currently authenticated user** (Bearer token). The
        `username` path segment is **not** used to choose whose profile is
        updated; authorization alone determines the subject. Clients often pass
        their own username in the path for URL compatibility. Starts a
        background task to connect Hedera credentials, publish DID/VC documents
        as required, and for Standard Registry users create an address book.
        Returns immediately with `202 Accepted` and a **task** identifier—use
        the worker-tasks API or your client notifications to track completion or
        errors.
      operationId: ProfileApi_setUserProfileAsync
      parameters:
        - name: username
          required: true
          in: path
          description: >-
            Present for URL compatibility with existing clients. The server does
            not use this value when applying the update—the request always
            targets the user identified by the Bearer token.
          schema:
            example: username
            type: string
      requestBody:
        required: true
        description: >-
          Hedera account, optional DID/VC payloads, and optional Fireblocks
          signing options. Submission is accepted immediately; processing
          happens in the background.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsDTO'
            examples:
              connectLocalStandardRegistry:
                summary: Local Hedera key + SR VC subject fields
                value:
                  hederaAccountId: 0.0.6059566
                  hederaAccountKey: >-
                    3030020100300706052b8104000a04220420dcfc59e2346b4f0cef1c9f11dee3af6c50be449a08badc55764498787e8a1899
                  vcDocument:
                    OrganizationName: Another Org name
                    Website: https://google.com
                    Tags: AnotherTag
                  didDocument: null
                  useFireblocksSigning: false
                  fireblocksConfig:
                    fireBlocksVaultId: ''
                    fireBlocksAssetId: ''
                    fireBlocksApiKey: ''
                    fireBlocksPrivateiKey: ''
                  didKeys: []
      responses:
        '202':
          description: >-
            Task accepted for asynchronous processing. Poll or subscribe for
            task status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDTO'
              example:
                taskId: 415e6c71-7fc5-4c67-a40d-918ed0202bd4
                expectation: 9
                action: Connect user
                userId: 69c2cfc621d39e7b6d15e23f
        '401':
          description: Unauthorized request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorDTO'
              example:
                statusCode: 401
                message: Unauthorized request
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorDTO'
              example:
                message: Forbidden resource
                error: Forbidden
                statusCode: 403
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorDTO'
              example:
                statusCode: 500
                message: Error message
      security:
        - bearer: []
      summary: Sets Hedera credentials asynchronously for the authenticated user.
      tags:
        - profiles
