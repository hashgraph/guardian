  /policies/{policyId}/virtual-keys:
    get:
      description: >-
        Returns a ZIP archive (DEFLATE) with virtual keys and DID documents for
        the policy dry run / demo context. The response uses `Content-Type:
        application/virtual-keys` and `Content-Disposition: attachment` with a
        `.vk` filename derived from the policy name. Archive layout: folder
        `virtualKeys/` — one `.json` file per virtual key (participant DIDs,
        excluding the Standard Registry owner DID); folder `dids/` — one `.json`
        file per DID document.  Only users with the Standard Registry role are
        allowed to make the request.
      operationId: PolicyApi_downloadVirtualKeys
      parameters:
        - name: policyId
          required: true
          in: path
          description: Policy Id
          schema:
            example: 69aeb71ef8c5b278e3bab4e5
            type: string
      responses:
        '200':
          description: >-
            Binary body: ZIP archive as described in the operation summary (not
            JSON).
          content:
            application/virtual-keys:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized request.
          content:
            application/virtual-keys:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorDTO'
              example:
                statusCode: 401
                message: Unauthorized request
        '403':
          description: Forbidden
          content:
            application/virtual-keys:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorDTO'
              example:
                message: Forbidden resource
                error: Forbidden
                statusCode: 403
        '500':
          description: Internal server error.
          content:
            application/virtual-keys:
              schema:
                $ref: '#/components/schemas/InternalServerErrorDTO'
              example:
                statusCode: 500
                message: Error message
      security:
        - bearer: []
      summary: Download virtual keys and DID documents (ZIP).
      tags:
        - policies
    post:
      description: >-
        Imports the same ZIP layout as `GET /policies/{policyId}/virtual-keys`
        exports: folders `virtualKeys/` and `dids/` with JSON files. Send raw
        archive bytes with `Content-Type: binary/octet-stream` (e.g. a `.vk`
        file from export).  Only users with the Standard Registry role are
        allowed to make the request.
      operationId: PolicyApi_uploadVirtualKeys
      parameters:
        - name: policyId
          required: true
          in: path
          description: Policy Id
          schema:
            example: 69aeb71ef8c5b278e3bab4e5
            type: string
      requestBody:
        required: true
        description: >-
          Raw bytes of the virtual-keys ZIP (same structure as the download
