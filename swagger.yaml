  /policies/{policyId}/savepoints/delete:
    post:
      description: >-
        Deletes the specified savepoints for the policy (Dry Run only). When the
        policy has more than one savepoint and `skipCurrentSavepointGuard` is
        `false`, the current savepoint cannot be deleted and the request fails.
        When `skipCurrentSavepointGuard` is `true`, that guard is bypassed; the
        UI uses this mode for "delete all savepoints". Leaf savepoints are
        hard-deleted, while savepoints with children are marked as deleted.
      operationId: PolicyApi_deleteSavepoints
      parameters:
        - name: policyId
          required: true
          in: path
          schema:
            example: 69aeb71ef8c5b278e3bab4e5
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSavepointsDTO'
      responses:
        '200':
          description: >-
            Deletion result. `hardDeletedIds` contains only savepoints that were
            hard-deleted. This array can be empty when the request causes only
            soft deletes (for example, deleting savepoints that still have
            children). If the current savepoint is included while the guard is
            enforced, the request fails instead of returning an empty result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hardDeletedIds:
                    type: array
                    items:
                      type: string
              examples:
                skipCurrentSavepointGuardFalse:
                  summary: Current savepoint guard enforced
                  value:
                    hardDeletedIds: []
                skipCurrentSavepointGuardTrue:
                  summary: Current savepoint guard skipped
                  value:
                    hardDeletedIds:
                      - 69c8d45081910b160912c4a8
                      - 69c8d44d81910b160912c49b
                      - 69c8d40281910b160912c480
                      - 69c8d40081910b160912c473
                      - 69c8d3fd81910b160912c466
        '401':
          description: Unauthorized request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorDTO'
              example:
                statusCode: 401
                message: Unauthorized request
        '403':
