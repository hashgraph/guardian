info:
  title: Guardian
  description: >-
    The Guardian is a modular open-source solution that includes best-in-class
    identity management and decentralized ledger technology (DLT) libraries. At
    the heart of the Guardian solution is a sophisticated Policy Workflow Engine
    (PWE) that enables applications to offer a requirements-based tokenization
    implementation.
  version: 3.6.0-rc
  contact:
    name: API developer
    url: https://envisionblockchain.com
    email: info@envisionblockchain.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
tags: []
servers:
  - url: /api/v1
    description: version 1.0
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PermissionGroupResponseDTO:
      type: object
      properties:
        uuid:
          type: string
          example: 9db028d2-03ad-4d49-a178-cf4b67f8c147
        roleId:
          type: string
          example: 69aeb71ef8c5b278e3bab4e5
        roleName:
          type: string
          example: Default policy user
