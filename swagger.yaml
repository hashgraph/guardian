  /policies/with-imported-records/{policyId}:
    get:
      description: >-
        Returns policies that have a records topic (draft/dry-run/demo/view),
        **excluding** the policy identified by `policyId`. There is **no request
        body**—only the path segment. The path value is used to omit that policy
        from the result (e.g. the record-import dialog so “another policy” does
        not include the one you are open on).
      operationId: PolicyApi_getPoliciesWithImportedRecords
      parameters:
        - name: policyId
          required: true
          in: path
          description: >-
            Policy id to **exclude** from the returned list. Pass the current
            policy id from the client context; the server uses this value only
            for that exclusion filter.
          schema:
            example: 69aeb71ef8c5b278e3bab4e5
            type: string
