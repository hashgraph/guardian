  /policies:
    get:
      description: >-
        Returns all policies. Add Api-Version: 2 header to use status filter.
        Each item may include userGroups (all group rows for this user on that
        policy, including inactive) and userGroup (the last active group in
        server order—handy for UI labels, e.g. groupLabel or uuid). Typically,
        for Standard Registry on dry-run policies, userRole and userGroup
        reflect the last active role (often a virtual user), and userGroups
        contains the group rows for that role; when the last active role is
        Administrator, userGroups is []. For regular users, userGroups usually
        show roles on published policies.
      operationId: PolicyApi_getPoliciesV2
      parameters:
        - name: pageIndex
          required: false
          in: query
          description: >-
            The number of pages to skip before starting to collect the result
            set
          schema:
            example: 0
            type: number
        - name: pageSize
          required: false
          in: query
          description: The numbers of items to return
          schema:
            example: 20
            type: number
        - name: type
          required: false
          in: query
          description: Policy type
          schema:
            example: local
            type: string
        - name: status
          required: false
          in: query
          explode: false
          description: >-
            Policy status. Multiple values are passed as a comma-separated list.
            In Swagger UI, select several values from the list by holding Ctrl
            (Windows/Linux) or Command (macOS).
          schema:
            type: array
            items:
              type: string
              enum:
                - DRY-RUN
                - DRAFT
                - PUBLISH_ERROR
                - PUBLISH
                - DISCONTINUED
                - DEMO
                - VIEW
        - name: Api-Version
          in: header
          description: Use "2" for this endpoint (supports status filter).
          required: true
          schema:
            type: string
      responses:
        '200':
          description: >-
            Successful operation. Two examples: regular user (userGroups usually
            reflect roles on published policies) and Standard Registry (dry-run:
            last active role and its userGroups; Administrator has userGroups
            []). Other combinations are possible depending on policy state and
            assignments.
          headers:
            X-Total-Count:
