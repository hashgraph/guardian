            4 = Manager (WIPE only), 8 = Wiper (WIPE v1.0.0 only). E.g. 3 =
            Owner+Admin (RETIRE), 7 = Owner+Admin+Manager (WIPE).
          example: 7
        topicId:
          type: string
          example: 0.0.6046379
        type:
          type: string
          enum:
            - WIPE
            - RETIRE
          example: WIPE
        syncPoolsDate:
          format: date-time
          type: string
          description: Last sync of retire pools (may be absent).
          example: '2026-03-03T17:25:53.312Z'
        lastSyncEventTimeStamp:
          type: string
          description: >-
            Hedera consensus timestamp string from last processed contract
            event.
          example: '1773997659.461000723'
        syncDisabled:
          type: boolean
          description: When true, automatic sync is disabled for this contract.
          example: false
        version:
          type: string
          description: Deployed contract ABI / behavior version.
          example: 1.0.1
        wipeContractIds:
          description: >-
            Legacy: linked WIPE contract Hedera ids (contract-level wiper).
            Often empty for `version` 1.0.1+; see `wipeTokenIds` instead.
          example: []
          type: array
          items:
            type: string
        wipeTokenIds:
          description: >-
            Token-level wiper allowlist (Hedera token ids). Typical for RETIRE
            contracts with `version` 1.0.1+; usually empty for WIPE contracts.
          example:
            - 0.0.8300593
          type: array
          items:
            type: string
      required:
        - createDate
        - updateDate
        - id
        - contractId
        - owner
        - permissions
        - topicId
        - type
