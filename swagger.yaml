            type: number
        - name: pageSize
          required: false
          in: query
          description: The numbers of items to return
          schema:
            example: 20
            type: number
        - name: search
          required: false
          in: query
          description: >-
            Filter by account name or Hedera account ID (case-insensitive,
            partial match). Leave empty to return all.
