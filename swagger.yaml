        sends a message featuring its IPFS CID into the corresponding Hedera
        topic. Only users with the Standard Registry role are allowed to make
        the request.
      operationId: ToolsApi_publishToolAsync
      parameters:
        - name: id
          required: true
          in: path
          description: Tool ID
          schema:
            example: 69aeb71ef8c5b278e3bab4e5
            type: string
      requestBody:
        required: true
        description: 'Tool version for publish. Required: toolVersion (e.g. "1.0.0").'
