  /profiles/{username}:
    get:
      description: >-
        Returns account information for the **currently authenticated user**
        (Bearer token). The `username` path segment is **not** used to choose
        whose profile is returned; authorization alone determines the subject.
        Clients often pass their own username in the path for URL compatibility.
        For users with the Standard Registry role the response also includes
        address book and VC document information.
      operationId: ProfileApi_getProfile
      parameters:
        - name: username
          required: true
          in: path
          description: >-
