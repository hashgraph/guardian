name: Guardian CI API Tests (Manual)
run-name: Guardian CI API Tests (Manual) - ${{ inputs.tags }}
on:
  workflow_dispatch:
    inputs:
      tags:
        type: string
        description: Tags for API tests scope(s) (smoke, accounts, policies, etc.)
        default: "all"
      report_name:
        type: string
        description: Cypress Report name
        default: "Guardian's Cypress Report"

jobs:
  buildAndTest:
    name: Build and Test (Manual)
    runs-on: guardian-linux-medium
    env:
      YARN_ENABLE_GLOBAL_CACHE: 'false'
    services:
      cache:
        image: valkey/valkey:8.1-alpine
        ports:
          - 6379:6379
    strategy:
      matrix:
        node-version: [ 24.18.0 ]
        mongodb-version: [ 7.0.21 ]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Cache yarn
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: |
          pushd interfaces
          yarn run build
          popd
          pushd common
          yarn run build
          popd
          pushd notification-service
          yarn run build
          popd
          pushd logger-service
          yarn run build
          popd
          pushd auth-service
          yarn run build
          popd
          pushd queue-service
          yarn run build
          popd
          pushd topic-listener-service
          yarn run build
          popd
          pushd guardian-service
          yarn run build
          popd
          pushd policy-service
          yarn run build
          popd
          pushd worker-service
          yarn run build
          popd
          pushd api-gateway
          yarn run build
          popd

      - name: Start NatsMQ
        uses: step-security/nats-action@2254b4cc4958120e36da3a096e8200dac968be1c # v0.1.4
        with:
          port: "4222"

      - name: Set up IPFS
        uses: oduwsdl/setup-ipfs@678755ac20f92d2dfca7e16138e40ae75f7a0f6f # v0.8.0
        with:
          ipfs_version: 0.42.0

      - name: Start IPFS offline
        shell: bash
        run: |
          # setup-ipfs always starts an online daemon (run_daemon is a no-op); stop it before our offline node.
          ipfs shutdown || true
          until ! curl -s -X POST http://127.0.0.1:5001/api/v0/id >/dev/null 2>&1; do sleep 0.5; done
          ipfs config profile apply test    # Routing.Type=none, no bootstrap, mDNS off
          ipfs bootstrap rm --all
          ipfs config Addresses.API /ip4/127.0.0.1/tcp/5001   # test profile randomizes ports; pin RPC for the app and probe
          ipfs config --json Discovery.MDNS.Enabled false
          ipfs daemon --offline &
          until curl -s -X POST http://127.0.0.1:5001/api/v0/id >/dev/null 2>&1; do sleep 0.5; done

      - name: Start MongoDB
        uses: step-security/mongodb-github-action@4c2640417c3e31ebd7439e64d47f9751bd782772
        with:
          mongodb-version: ${{ matrix.mongodb-version }}

      - name: Run Guardian
        run: |
          start() { for s in "$@"; do (cd "$s" && npm start) & done; }

          start logger-service notification-service
          sleep 5
          start auth-service queue-service
          sleep 5
          start policy-service topic-listener-service
          for _ in {1..5}; do (cd worker-service && npm start) & done
          sleep 5
          start guardian-service
          sleep 5
          start api-gateway

          echo "Waiting for API gateway on :3002..."
          timeout 180 bash -c 'until (exec 3<>/dev/tcp/127.0.0.1/3002) 2>/dev/null; do sleep 2; done'
          sleep 15   # grace for backend NATS subscriptions
        env:
          CI: true
          NODE_OPTIONS: '--openssl-legacy-provider'
          OPERATOR_ID: ${{ secrets.CI_HEDERA_ACCOUNT }}
          OPERATOR_KEY: ${{ secrets.CI_HEDERA_PRIV_KEY }}
          JWT_PRIVATE_KEY: ${{ secrets.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.CI_JWT_PUBLIC_KEY }}
          SERVICE_JWT_PUBLIC_KEY_ALL: ${{ secrets.CI_JWT_PUBLIC_KEY }}
          SERVICE_JWT_SECRET_KEY_ALL: ${{ secrets.CI_JWT_PRIVATE_KEY }}
          IPFS_NODE_ADDRESS: http://127.0.0.1:5001
          IPFS_PROVIDER: local
          IPFS_PUBLIC_GATEWAY: https://ipfs.filebase.io/ipfs/{cid}
          IPFS_STORAGE_KEY: ${{ secrets.E2E_IPFS_STORAGE_KEY }}
          IPFS_STORAGE_PROOF: ${{ secrets.E2E_IPFS_STORAGE_PROOF }}
          IPFS_STORAGE_API_KEY: ${{ secrets.IPFS_STORAGE_API_KEY }}
          ACCESS_TOKEN_UPDATE_INTERVAL: 600000
          MIN_PASSWORD_LENGTH: 4
          PASSWORD_COMPLEXITY: easy
          INITIAL_BALANCE: 10
          INITIAL_STANDARD_REGISTRY_BALANCE: 200

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@6997872a55d77391e51b87609556578131f44402 # v4.1.0

      - name: Build Cypress Docker image
        uses: step-security/docker-build-push-action@9af9b5acc1751dcec2aa5375a068979fa526bc9a # v7.2.0
        with:
          context: ./e2e-tests
          tags: cypress-runner
          load: true
          cache-from: type=local,src=/tmp/buildkit-cache
          cache-to: type=local,dest=/tmp/buildkit-cache,mode=min

      - name: Run Cypress API Tests in Docker
        run: |
          docker run --network host --name cypress-test-run \
            -e CYPRESS_portApi=3002 \
            -e CYPRESS_BROWSER=chromium \
            -e CYPRESS_operatorId=${{ secrets.CI_HEDERA_ACCOUNT }} \
            -e CYPRESS_operatorKey=${{ secrets.CI_HEDERA_PRIV_KEY }} \
            -e CYPRESS_MGSAdmin=${{ secrets.MGS_TENANT_NAME }} \
            -e CYPRESS_MGSIndexerAPIToken=${{ secrets.MGSIndexerAPIToken }} \
            -e "CYPRESS_grepTags=${{ inputs.tags }}" \
            -e CYPRESS_grepFilterSpecs=true \
            -e ReportName="${{ inputs.report_name }}" \
            cypress-runner

      - name: Copy test results from Docker container
        if: always()
        run: |
          mkdir -p e2e-tests/cypress/test_results e2e-tests/cypress/reports e2e-tests/cypress/screenshots e2e-tests/cypress/videos e2e-tests/cypress/downloads
          docker cp cypress-test-run:/e2e/cypress/test_results/. e2e-tests/cypress/test_results/ || true
          docker cp cypress-test-run:/e2e/cypress/reports/. e2e-tests/cypress/reports/ || true
          docker cp cypress-test-run:/e2e/cypress/screenshots/. e2e-tests/cypress/screenshots/ || true
          docker cp cypress-test-run:/e2e/cypress/videos/. e2e-tests/cypress/videos/ || true
          docker cp cypress-test-run:/e2e/cypress/downloads/. e2e-tests/cypress/downloads/ || true
          find e2e-tests/cypress/reports -type f 2>/dev/null || true

      - name: Cleanup Docker resources
        if: always()
        run: |
          docker rm -f cypress-test-run || true

      - name: Publish API Test Results
        uses: step-security/publish-unit-test-result-action@681100d67b09305624c089873f12c545ee7cbc24 # v2.23.0
        if: always()
        with:
          files: e2e-tests/cypress/test_results/**/*.xml

      - name: Upload tests results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: cypress-reports
          path: |
            e2e-tests/cypress/reports/
            e2e-tests/cypress/screenshots/
            e2e-tests/cypress/videos/
            e2e-tests/cypress/downloads/
          include-hidden-files: true
          retention-days: 7
