# GPU override for all services with ONNX embedding support
# Services: document-ingestion-worker, hedera-guardian-mcp-server, schema-ingestion-worker
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml <command>
#
# Examples:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml build
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d hedera-guardian-mcp-server
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml run --rm document-ingestion-worker
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml run --rm schema-ingestion-worker

services:
  document-ingestion-worker:
    # security_opt, cap_drop, logging, volumes, environment, depends_on inherited from docker-compose.yml
    build:
      args:
        VARIANT: gpu
    image: document-ingestion-worker:gpu
    container_name: document-ingestion-worker-gpu
    # GPU with 4 parallel subprocesses needs more memory than CPU's 10g
    mem_limit: 24g
    memswap_limit: 28g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      # Override accelerator to force CUDA
      - DOCUMENT_INGESTION_ACCELERATOR_DEVICE=cuda
      # High Quality 16+ GB profile: better resolution for formula recognition
      - DOCUMENT_INGESTION_PDF_IMAGES_SCALE=${DOCUMENT_INGESTION_PDF_IMAGES_SCALE:-4.0}
      # Surya: upscaling not needed at high resolution
      - DOCUMENT_INGESTION_SURYA_UPSCALE_FACTOR=${DOCUMENT_INGESTION_SURYA_UPSCALE_FACTOR:-1.0}
      # Larger batch sizes for GPU
      - DOCUMENT_INGESTION_EMBEDDING_BATCH_SIZE=${DOCUMENT_INGESTION_EMBEDDING_BATCH_SIZE:-10}
      - DOCUMENT_INGESTION_OCR_BATCH_SIZE=${DOCUMENT_INGESTION_OCR_BATCH_SIZE:-32}
      - DOCUMENT_INGESTION_LAYOUT_BATCH_SIZE=${DOCUMENT_INGESTION_LAYOUT_BATCH_SIZE:-32}
      - DOCUMENT_INGESTION_TABLE_BATCH_SIZE=${DOCUMENT_INGESTION_TABLE_BATCH_SIZE:-4}
      # More CPU threads for GPU builds
      - DOCUMENT_INGESTION_NUM_THREADS=${DOCUMENT_INGESTION_NUM_THREADS:-4}
      # Higher parallelism for GPU (sufficient VRAM assumed)
      - DOCUMENT_INGESTION_MAX_PARALLEL_FILES=${DOCUMENT_INGESTION_MAX_PARALLEL_FILES:-4}
      # Per-subprocess memory limit (GB) — optional, no OOM killer concern on Linux/Docker
      - DOCUMENT_INGESTION_SUBPROCESS_MEMORY_LIMIT_GB=${DOCUMENT_INGESTION_SUBPROCESS_MEMORY_LIMIT_GB:-}
      # Enable Surya formula enrichment (GPU recommended)
      - DOCUMENT_INGESTION_USE_SURYA_FORMULA_ENRICHMENT=${DOCUMENT_INGESTION_USE_SURYA_FORMULA_ENRICHMENT:-true}
      - DOCUMENT_INGESTION_SURYA_BATCH_SIZE=${DOCUMENT_INGESTION_SURYA_BATCH_SIZE:-16}

  hedera-guardian-mcp-server:
    build:
      args:
        VARIANT: gpu
    image: hedera-guardian-mcp-server:gpu
    container_name: hedera-guardian-mcp-server-gpu
    mem_limit: 6g
    memswap_limit: 7g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  schema-ingestion-worker:
    build:
      args:
        VARIANT: gpu
    image: schema-ingestion-worker:gpu
    container_name: schema-ingestion-worker-gpu
    mem_limit: 6g
    memswap_limit: 7g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
