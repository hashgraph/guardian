[tool.poetry]
name = "schema-ingestion-worker"
version = "0.1.0"
description = "Schema ingestion worker service for parsing and processing JSON schema files"
authors = ["Hedera Hashgraph LLC"]
license = "MIT"
readme = "README.md"
packages = [
    { include = "schema_ingestion_worker", from = "src" },
]

[tool.poetry.dependencies]
python = "^3.11"
python-dotenv = "^1.0.0"
pydantic = "^2.0.0"
pydantic-settings = "^2.0.0"
vector-store = {path = "../vector_store", develop = true}
aiofiles = "^23.0"

[tool.poetry.group.dev.dependencies]
ruff = ">=0.15.0"

# Component-specific test dependencies
[tool.poetry.group.test.dependencies]
pytest = "^9.0.0"
pytest-mock = "^3.12.0"
pytest-asyncio = "^1.3.0"
pytest-cov = "^4.1.0"

# Optional integration test dependencies
[tool.poetry.group.integration-test]
optional = true

[tool.poetry.group.integration-test.dependencies]
pytest-asyncio = "^1.3.0"
testcontainers = {extras = ["qdrant"], version = "^4.0.0"}

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
