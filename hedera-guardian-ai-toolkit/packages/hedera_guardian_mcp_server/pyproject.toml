[tool.poetry]
name = "hedera-guardian-mcp-server"
version = "0.1.0"
description = "MCP server providing semantic search tools for the Hedera Guardian Service"
authors = ["Hedera Hashgraph LLC"]
license = "MIT"
readme = "README.md"
packages = [
    { include = "mcp_server", from = "src" },
]

[tool.poetry.dependencies]
python = "^3.11"
fastmcp = "2.14.5"
pydantic = "^2.12.4"
vector-store = {path = "../vector_store", develop = true}
policy-schema-builder = {path = "../policy_schema_builder", develop = true}

[tool.poetry.group.dev.dependencies]
ruff = ">=0.15.0"  # Linter and formatter

# Component-specific test dependencies
[tool.poetry.group.test.dependencies]
pytest = "^9.0.0"
pytest-asyncio = "^1.3.0"  # Async testing support
pytest-cov = "^4.1.0"  # Code coverage reporting
inline-snapshot = ">=0.31.1"  # Snapshot testing

# Optional integration test dependencies
[tool.poetry.group.integration-test]
optional = true

[tool.poetry.group.integration-test.dependencies]
# Add integration test dependencies here as needed:
# - httpx = "^0.24.0" for HTTP client testing
# - testcontainers = "^3.7.0" for Docker-based integration tests
# - docker = "^6.1.0" for Docker integration

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.inline-snapshot]
format-command = "ruff format --stdin-filename {filename}"
# Disable inline-snapshot's path checking when tests are in separate directory
update-mode = "fix"
