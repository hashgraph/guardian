services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: carbon
      POSTGRES_PASSWORD: carbon
      POSTGRES_DB: carbon_market
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbon -d carbon_market"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://carbon:carbon@db:5432/carbon_market
      ALEMBIC_DATABASE_URL: postgresql://carbon:carbon@db:5432/carbon_market
      CORS_ORIGINS: "http://localhost:3000,http://localhost:4200"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
