<div class="search-result-card">
  <h5>{{ label }}</h5>
  <p>{{ text }}</p>
  <div class="card-buttons">
    <button (click)="onRegisterProject(id)" class="button secondary" label="Register Project" pButton
    type="button"></button>
    @if (detailsUrl) {
      <button (click)="onLearnMore()" class="button" label="Learn More" pButton
      type="button"></button>
    }
  </div>
</div>
