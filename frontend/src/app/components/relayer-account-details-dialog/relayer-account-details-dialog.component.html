<div #dialogHeader class="dialog-header">
  <div class="header-container">
    <div class="header-text">{{title}}</div>
  </div>
  <div class="header-icon resize" (click)="toggleSize()" [title]="isLargeSize ? 'The size 50%' : 'The size 90%'">
    <i [class]="isLargeSize ? 'pi pi-window-minimize' : 'pi pi-window-maximize'"></i>
  </div>
  <div class="header-icon" (click)="onClose()">
    <svg-icon src="/assets/images/icons/close.svg" svgClass="icon-color-close"></svg-icon>
  </div>
</div>
<div class="dialog-body">
  <div class="context">
    @if (loading) {
      <div class="guardian-loading">
        <div class="guardian-loading-image"></div>
      </div>
    }


    <div class="dialog-grid-container">
      @if (page.length) {
        <div class="dialog-grid-header">
          <div class="col-auto">Policy name</div>
          <div class="col-auto">Schema</div>
          <div class="col-150">Actions</div>
        </div>
      }
      @if (page.length) {
        <div class="dialog-grid-body vertical-border">
          @for (item of page; track item) {
            <div class="dialog-grid-row row-52">
              <div class="col-auto">
                {{item.policyName}}
              </div>
              <div class="col-auto">
                {{item.schemaName}}
              </div>
              <div class="col-150">
                <button
                  (click)="onOpenDocument(item)"
                  class="guardian-button guardian-button-secondary grid-btn"
                >View Document</button>
              </div>
            </div>
          }
        </div>
      }
      @if (!page.length) {
        <div class="dialog-grid-empty">
          <div>
            <svg-icon
              class="icon-btn"
              src="/assets/images/icons/list.svg"
              svgClass="icon-color-disabled">
            </svg-icon>
          </div>
          <div>There are no documents</div>
        </div>
      }
      @if (page.length) {
        <div class="guardian-grid-paginator">
          <app-paginator
            class="guardian-grid-paginator"
            [pageIndex]="pageIndex"
            [pageSize]="pageSize"
            [length]="count"
            (page)="onPage($event)"
          ></app-paginator>
        </div>
      }
    </div>


  </div>
</div>
<div class="dialog-footer">
  <div class="action-buttons">
    <div class="dialog-button">
      <button
        (click)="onClose()"
      class="guardian-button guardian-button-secondary">Close</button>
    </div>
  </div>
</div>
