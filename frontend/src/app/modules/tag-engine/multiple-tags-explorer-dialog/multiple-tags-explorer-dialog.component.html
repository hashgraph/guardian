<div class="dialog-body">
  <div class="context">
    @if (loading) {
      <div class="loading">
        <div class="preloader preloader-image-l-size"></div>
      </div>
    }
    @if (!loading) {
      @if (items && items.length) {
        <div class="content">
          @for (item of items; track item) {
            <div class="tag-item-block">
              <p class="tag-item-title">
                {{ item.tag }}
              </p>
              @if (hasHistoryItems(item)) {
                <div class="tags-container">
                  @for (historyItem of getHistoryItems(item); track historyItem) {
                    <div class="tag-item">
                      <svg-icon
                        class="svg-icon-16"
                        src="/assets/images/icons/16/label.svg"
                        svgClass="primary-color">
                      </svg-icon>
                      <div class="name">
                        {{ historyItem.name }}
                      </div>
                      <!-- <svg-icon
                      (click)="onTagDelete(item, historyItem)"
                      class="svg-icon-16"
                      src="/assets/images/icons/16/circle-close.svg"
                      [svgClass]="'primary-color'">
                    </svg-icon> -->
                  </div>
                }
              </div>
            }
            @if (canCreate) {
              <button (click)="onAdd(item)"
                [label]="'Create Tag'"
                class="button secondary"
                icon="pi pi-plus"
                style="margin-top: 16px; margin-bottom: 24px;"
                pButton>
              </button>
            }
          </div>
        }
      </div>
    }
  }
</div>
</div>

<div class="dialog-footer">
  <div class="action-buttons">
    <div>
      @if (canCreate) {
        <button (click)="onAddForAllSelected()"
          [label]="'Create Tag for All Selected'"
          class="button secondary"
          icon="pi pi-plus"
          pButton>
        </button>
      }
    </div>
    <div class="cancel-button">
      <button (click)="dialogRef.close()" [disabled]="loading" class="button secondary" label="Close" pButton></button>
    </div>
  </div>
</div>
