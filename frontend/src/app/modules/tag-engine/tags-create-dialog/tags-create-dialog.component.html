<div>
    <div *ngIf="entities && entities.length > 0" class="form-input-container">
        <label class="p-field-label">Selected Entities</label>
        <div class="entity-tag-blocks-container">
            <div *ngFor="let entity of entities" class="entity-tag-block">
                <p class="entity-tag-name">
                    {{ entity.tag }}
                </p>
            </div>
        </div>
    </div>
    <form [formGroup]="dataForm">
        <div class="form-input-container">
            <label class="p-field-label">* Name</label>
            <input class="p-field-input" formControlName="name" pInputText type="text"/>
        </div>
        <div class="form-input-container">
            <label class="p-field-label">Description</label>
            <input class="p-field-input" formControlName="description" pInputText type="text"/>
        </div>
        <div class="form-input-container">
            <ng-container *ngIf="inheritTagsOption">
                <p-checkbox
                    class="guardian-checkbox-secondary checkbox-24"
                    formControlName="inheritTags"
                    [binary]="true"
                    [styleClass]="'primary-checkbox'"
                    pTooltip="Tags will be automatically added to all documents generated by this workflow section."
                    tooltipStyleClass="guardian-tooltip wide-guardian-tooltip"
                    label="Inherit Tags"
                ></p-checkbox>
            </ng-container>
        </div>
    </form>

    <div *ngIf="schemas && schemas.length" class="artifact-container">
        <p-dropdown 
            *ngIf="canAddDocument" 
            [appendTo]="'body'" 
            [(ngModel)]="schema" 
            [options]="schemas" 
            optionLabel="name"
            class="guardian-dropdown"
            panelStyleClass="guardian-dropdown-panel"
        >
            <ng-template pTemplate="selectedItem">
                <div *ngIf="schema" class="country-item country-item-value">
                    <div>{{ schema.name }}</div>
                </div>
            </ng-template>
            <ng-template let-schema pTemplate="item">
                <div class="country-item">
                    <div>{{ schema.name }}</div>
                </div>
            </ng-template>
        </p-dropdown>

        <div *ngIf="schema" class="artifact-form">
            <div class="artifact-form-label">
                {{ schema.name }}
            </div>

            <div
                class="guardian-icon-button big delete-artifact"
                (click)="onDeleteArtifact()">
                <svg-icon
                    class="icon-btn"
                    src="/assets/images/icons/delete.svg"
                    [svgClass]="'icon-color-delete'">
                </svg-icon>
            </div>

            <!-- <div (click)="onDeleteArtifact()" class="delete-artifact">
                <i class="pi pi-trash"></i>
            </div> -->
            <form [formGroup]="schemaForm">
                <app-schema-form-root
                    [schema]="schema" 
                    [showButtons]="false"
                    (form)="initForm($event)">
                </app-schema-form-root>
            </form>
        </div>
    </div>
    <div class="dialog-footer">
        <button (click)="!noSchemas && onAddArtifact(schema)" *ngIf="!schema" [class.disabled-button]="noSchemas"
            [pTooltip]="noSchemas ? 'Create and publish document schema first' : undefined" tooltipPosition="top"
            class="button secondary" label="Add Document" pButton style="margin-right: auto;"></button>
        <button (click)="onNoClick()" class="button secondary" label="Cancel" pButton></button>
        <button (click)="onCreate()" [disabled]="disabled" [label]="'Create'" class="button" pButton></button>
    </div>
</div>
