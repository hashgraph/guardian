<div class="tree-container">
  <div
    #movedEl
    class="tree-graph"
    [attr.moving]="moving"
    (mousedown)="onMouseDown($event)"
    (mouseup)="onMouseUp($event)"
    (mouseleave)="onMouseUp($event)"
    (mouseenter)="onMouseUp($event)"
    (wheel)="onScroll($event)"
    >
    <div #gridEl class="tree-moving-container">
      @if (grid) {
        <div
          class="tree-grid"
          [style.grid-template-columns]="grid.columnsTemplate"
          [style.grid-template-rows]="grid.rowsTemplate"
          >
          @for (node of grid.nodes; track node) {
            <div
              [style.grid-column-start]="node.minColumn"
              [style.grid-column-end]="node.maxColumn"
              [style.grid-row-start]="node.minRow"
              [style.grid-row-end]="node.maxRow"
              class="tree-node-container"
              >
              <div class="tree-node" (click)="onSelectNode(node)" [attr.node-id]="node.uuid">
                <div class="tree-node-content">
                  <ng-container [ngTemplateOutlet]="nodeTemplate" [ngTemplateOutletContext]="{ node }"></ng-container>
                </div>
                @if (node.linkLine) {
                  <div
                            class="tree-link-line {{ node.linkLine.variant ? 'variant-' + node.linkLine.variant : '' }} selected-type-{{
                                node.linkLine.selected
                            }}"
                    [style.width.px]="node.linkLine.width"
                  ></div>
                }
              </div>
              <div class="tree-node-lines">
                @for (line of node.lines; track line) {
                  <div
                    class="tree-node-line {{ line.type }}-line selected-type-{{ line.selected }}"
                    [style.width.px]="line.width"
                  ></div>
                }
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
