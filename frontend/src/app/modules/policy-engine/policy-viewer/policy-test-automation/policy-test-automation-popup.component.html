<div class="policy-test-automation-popup" *ngIf="draftService.draft$ | async as draft">
    <div class="policy-test-automation-title">Policy Test Automation</div>

    <div class="policy-test-section">
        <div class="policy-test-section-title">Input</div>

        <label class="policy-test-checkbox-row" *ngIf="!draft.input">
            <input
                type="checkbox"
                [checked]="draft.captureNextFormSubmit"
                (change)="onCaptureChange($any($event.target).checked)"
            />
            <span>Capture Form Submission Data</span>
        </label>

        <div class="policy-test-awaiting" *ngIf="draft.captureNextFormSubmit && !draft.input">
            AWAITING INPUT
        </div>

        <div class="policy-test-help" *ngIf="draft.captureNextFormSubmit && !draft.input">
            <i class="pi pi-info-circle"></i>
            <span>Data on next form submission will be used for test input</span>
        </div>

        <button
            type="button"
            class="policy-test-status-button"
            *ngIf="!draft.input"
            [disabled]="true">
            AWAITING INPUT
        </button>

        <button
            type="button"
            class="policy-test-status-button policy-test-status-button-active"
            *ngIf="draft.input"
            (click)="onAwaitingOutputsClick()">
            AWAITING OUTPUTS
        </button>

        <div class="policy-test-draft-item" *ngIf="draft.input">
            <span>{{ draft.input.title || 'Input captured' }}</span>
            <button type="button" (click)="inspectInput()">Inspect Data</button>
            <button type="button" (click)="discardInput()">Discard</button>
        </div>
    </div>

    <div class="policy-test-section">
        <div class="policy-test-section-title">Outputs</div>
        <div class="policy-test-draft-item" *ngFor="let output of draft.outputs">
            <span>{{ output.title || output.type }}</span>
            <button type="button" (click)="inspectOutput(output)">Inspect Data</button>
            <button type="button" (click)="discardOutput(output.type, output.id)">Discard</button>
        </div>
        <div class="policy-test-muted" *ngIf="draft.outputs.length === 0">No outputs yet</div>
    </div>
</div>
