<div class="policy-test-automation-popup" *ngIf="automationService.state$ | async as state">
    <div class="policy-test-header">
        <span class="policy-test-title">Policy Test Automation</span>
    </div>

    <label class="policy-test-capture-row">
        <input
            type="checkbox"
            [checked]="state.captureNextFormSubmit"
            (change)="onCaptureChange($any($event.target).checked)"
        />
        <span>Capture test data on next form submission</span>
    </label>

    <div class="policy-test-cases">
        <ng-container *ngIf="state.testCases.length === 0">
            <div class="policy-test-empty-title">Test Data</div>
            <div class="policy-test-empty-msg">Not captured yet</div>
        </ng-container>

        <div class="policy-test-case-card" *ngFor="let tc of state.testCases">
            <div class="test-case-header">
                <span class="test-case-name">{{ tc.name }}</span>
                <button type="button" class="test-case-discard-btn" (click)="discardTestCase(tc.id)">
                    <i class="pi pi-trash"></i> Discard
                </button>
            </div>
            <div class="test-case-body">
                <div class="test-case-input-col">
                    <button type="button" class="test-case-link-btn" (click)="viewInput(tc.id)">
                        <i class="pi pi-search"></i> View Input
                    </button>
                </div>
                <div class="test-case-outputs-col">
                    <div class="test-case-output-row" *ngFor="let out of tc.outputs">
                        <label class="test-case-output-check">
                            <input
                                type="checkbox"
                                [checked]="out.selected"
                                (change)="toggleOutputSelected(tc.id, out.documentId)"
                            />
                            <span>{{ out.tag }}</span>
                        </label>
                        <button type="button" class="test-case-link-btn" (click)="viewOutput(tc.id, out.documentId)">
                            <i class="pi pi-search"></i> View Document
                        </button>
                    </div>
                    <div class="test-case-loading" *ngIf="tc.outputs.length === 0">
                        Loading outputs...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
