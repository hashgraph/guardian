<div class="policy-test-automation-popup" *ngIf="automationService.state$ | async as state">
    <div class="policy-test-automation-header">
        <div class="policy-test-automation-title">Policy Test Automation</div>

        <span
            class="policy-test-status-badge"
            *ngIf="!state.input">
            AWAITING INPUT
        </span>

        <span
            class="policy-test-status-badge policy-test-status-badge-active"
            *ngIf="state.input">
            AWAITING OUTPUTS
        </span>
    </div>

    <div class="policy-test-section">
        <div class="policy-test-section-title">Input</div>

        <div class="policy-test-section-body" [ngClass]="{'policy-test-section-body-captured': state.input}">
            <div class="policy-test-section-left">
                <label class="policy-test-checkbox-row" *ngIf="!state.input">
                    <input
                        type="checkbox"
                        [checked]="state.captureNextFormSubmit"
                        (change)="onCaptureChange($any($event.target).checked)"
                    />
                    <span>Capture Form Submission Data</span>
                </label>

                <div class="policy-test-item" *ngIf="state.input">
                    <span>{{ state.input.title || 'Input captured' }}</span>
                    <div class="policy-test-actions">
                        <button type="button" (click)="inspectInput()"><i class="pi pi-search"></i>View Input</button>
                        <button type="button" (click)="discardInput()"><i class="pi pi-trash"></i>Discard</button>
                    </div>
                </div>
            </div>

            <div class="policy-test-section-right">
                <div class="policy-test-help" *ngIf="!state.input">
                    <i class="pi pi-info-circle"></i>
                    <span>Data on next form submission will be used for test input</span>
                </div>
            </div>
        </div>
    </div>

    <div class="policy-test-section" [ngClass]="{'policy-test-section-disabled': !state.input && state.outputs.length === 0}">
        <div class="policy-test-section-title">Outputs</div>

        <div class="policy-test-section-body" [ngClass]="{'policy-test-section-body-captured': state.outputs.length > 0}">
            <div class="policy-test-section-left">
                <div class="policy-test-muted" *ngIf="state.outputs.length === 0">No outputs yet</div>

                <div class="policy-test-item" *ngFor="let output of state.outputs">
                    <span>{{ output.title || output.type }}</span>
                    <div class="policy-test-actions">
                        <button type="button" (click)="inspectOutput(output)"><i class="pi pi-search"></i>View Output</button>
                        <button type="button" (click)="discardOutput(output.type, output.id)"><i class="pi pi-trash"></i>Discard</button>
                    </div>
                </div>

                <button
                    type="button"
                    class="policy-test-section-action"
                    *ngIf="state.input"
                    (click)="confirmDocumentResults()">
                    Confirm Document Results
                </button>
            </div>

            <div class="policy-test-section-right">
                <div class="policy-test-help" *ngIf="state.input && state.outputs.length === 0">
                    <i class="pi pi-info-circle"></i>
                    <span>Review Document output and confirm they are correct</span>
                </div>
            </div>
        </div>
    </div>
</div>
