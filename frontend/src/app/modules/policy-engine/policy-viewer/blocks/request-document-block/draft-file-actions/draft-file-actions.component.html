<button
    (click)="onExportDraft()"
    class="guardian-button guardian-button-secondary"
    type="button"
>
    <div class="guardian-button-icon">
        <svg-icon
            class="icon-btn svg-icon"
            src="/assets/images/icons/export-file.svg"
            svgClass="icon-color-primary"
        ></svg-icon>
    </div>
    <div class="guardian-button-label">Save draft to file</div>
</button>
<button
    (click)="triggerImportDraft()"
    class="guardian-button guardian-button-secondary"
    type="button"
>
    <div class="guardian-button-icon">
        <svg-icon
            class="icon-btn svg-icon"
            src="/assets/images/icons/import-file.svg"
            svgClass="icon-color-primary"
        ></svg-icon>
    </div>
    <div class="guardian-button-label">Restore from draft file</div>
</button>
<input
    #draftFileInput
    type="file"
    accept="application/json,.json"
    hidden
    (change)="onImportDraft($event)">
