@if (tags) {
  <div class="content" [attr.readonly-block]="readonly">
    <tags-explorer
      [data]="tags"
      [owner]="owner"
      [target]="target"
      [entity]="entity"
      [schemas]="tagSchemas"
    [service]="tagsService"></tags-explorer>
  </div>
}

<ng-template #preloader>
  <div class="preloader-image"></div>
</ng-template>

@if (loading) {
  <div class="loading">
    <div class="preloader-image preloader-image-l-size"></div>
  </div>
}
