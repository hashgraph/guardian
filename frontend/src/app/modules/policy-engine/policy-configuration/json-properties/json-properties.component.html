<div [attr.readonly]="readonly">
  @if (loading) {
    <div class="loading">
      <div class="preloader-image preloader-image-l-size"></div>
    </div>
  }
  <div class="toolbar">
    <div class="toolbar-btn toolbar__save-btn" [attr.readonly]="readonly || !dirty" (click)="onSave()">
      <i class="pi pi-save"></i>
      <span>Save</span>
    </div>
    <div class="toolbar-btn toolbar__close-btn" [attr.readonly]="readonly || !dirty" (click)="onClose()">
      <i class="pi pi-times"></i>
      <span>Cancel</span>
    </div>
  </div>
  @if (errors && errors.length) {
    <div class="json-errors">
      @for (item of errors; track item) {
        <div class="errors-property">
          <span></span>{{ item }}
        </div>
      }
    </div>
  }
  <div class="textarea-code">
    <ngx-codemirror [(ngModel)]="code" [options]="codeMirrorOptions"></ngx-codemirror>
  </div>
</div>
