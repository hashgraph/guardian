<!-- UI Prop -->
@if (properties) {
  <table class="properties token-properties" [attr.readonly]="readonly">
  <colgroup><col class="col-toggle"><col class="col-name"><col class="col-value"></colgroup>
    <tr class="propHeader" (click)="onHide(propHidden, 'main')">
      <td class="propRowCol"></td>
      <td class="propHeaderCell cellName token-section-header" [attr.collapse]="propHidden.main">
        <i class="pi pi-chevron-down chevron-icon"></i>
        <span>Main</span>
      </td>
      <td class="propHeaderCell"></td>
    </tr>
    @if (!propHidden.main) {
      <tr class="propRow">
        <td class="propRowCol"></td>
        <td class="propRowCell cellName">Autorun</td>
        <td class="propRowCell">
          <p-toggleswitch
            [(ngModel)]="properties.autorun"
            [disabled]="readonly"
            (onChange)="onSave()">
          </p-toggleswitch>
        </td>
      </tr>
      <tr class="propHeader">
        <td class="propRowCol"></td>
        <td class="propHeaderCell cellName">
          <span>Token Template</span>
        </td>
        <td class="propHeaderCell"></td>
      </tr>
      <tr class="propRow">
        <td class="propRowCol"></td>
        <td class="propRowCell cellName">Token Name</td>
        <td class="propRowCell">
          <input class="prop-input" [(ngModel)]="properties.tokenName" [readonly]="readonly" (blur)="onSave()">
        </td>
      </tr>
    }
  </table>
}
