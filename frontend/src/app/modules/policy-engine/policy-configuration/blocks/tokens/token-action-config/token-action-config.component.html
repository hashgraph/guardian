@if (properties) {
  <table class="properties token-action-properties" [attr.readonly]="readonly">
  <colgroup><col class="col-toggle"><col class="col-name"><col class="col-value"></colgroup>
    <tr class="propRow">
      <td class="propRowCol"></td>
      <td class="propRowCell cellName">Use Template</td>
      <td class="propRowCell">
        <p-toggleswitch
          [(ngModel)]="properties.useTemplate"
          [disabled]="readonly"
          (onChange)="onUseTemplateChange(); onSave()">
        </p-toggleswitch>
      </td>
    </tr>
    <tr class="propHeader" (click)="onHide(propHidden, 'main')">
      <td class="propRowCol"></td>
      <td class="propHeaderCell cellName token-action-section-header" [attr.collapse]="propHidden.main">
        <i class="pi pi-chevron-down chevron-icon"></i>
        <span>Main</span>
      </td>
      <td class="propHeaderCell"></td>
    </tr>
    @if (!propHidden.main) {
      @if (!properties.useTemplate) {
        <tr class="propRow">
          <td class="propRowCol"></td>
          <td class="propRowCell cellName">Token</td>
          <td class="propRowCell">
            <p-select [(ngModel)]="properties.tokenId"
              [options]="tokens"
              [disabled]="readonly"
              (onChange)="onSave()"
              placeholder="Select Token"
              optionLabel="name"
              optionValue="value"
              [appendTo]="'body'"
              >
            </p-select>
          </td>
        </tr>
      }
      @if (properties.useTemplate) {
        <tr class="propRow">
          <td class="propRowCol"></td>
          <td class="propRowCell cellName">Token Template</td>
          <td class="propRowCell">
            <p-select [(ngModel)]="properties.template"
              [options]="tokenTemplate"
              [disabled]="readonly"
              (onChange)="onSave()"
              placeholder="Select Template"
              optionLabel="name"
              optionValue="value"
              [appendTo]="'body'"
              >
            </p-select>
          </td>
        </tr>
      }
      <tr class="propRow">
        <td class="propRowCol"></td>
        <td class="propRowCell cellName">Account Type</td>
        <td class="propRowCell">
          <p-select [(ngModel)]="properties.accountType"
            [options]="accountTypeOptions"
            [disabled]="readonly"
            (onChange)="onSave()"
            placeholder="Select Account Type"
            optionLabel="label"
            optionValue="value"
            [appendTo]="'body'"
            >
          </p-select>
        </td>
      </tr>
      @if (properties.accountType==='custom') {
        <tr class="propRow">
          <td class="propRowCol"></td>
          <td class="propRowCell cellName">Account Id (Field)</td>
          <td class="propRowCell">
            <input class="prop-input" [(ngModel)]="properties.accountId" [readonly]="readonly" (blur)="onSave()">
          </td>
        </tr>
      }
      <tr class="propRow">
        <td class="propRowCol"></td>
        <td class="propRowCell cellName">Action</td>
        <td class="propRowCell">
          <p-select [(ngModel)]="properties.action"
            [options]="properties.accountType==='custom' ? actionOptionsCustom : actionOptions"
            [disabled]="readonly"
            (onChange)="onSave()"
            placeholder="Select Action"
            optionLabel="label"
            optionValue="value"
            [appendTo]="'body'"
            >
          </p-select>
        </td>
      </tr>
    }
  </table>
}
