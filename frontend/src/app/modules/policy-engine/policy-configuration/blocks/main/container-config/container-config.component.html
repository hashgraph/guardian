@if (properties) {
  <table class="properties" [attr.readonly]="readonly">
    <colgroup><col class="col-toggle"><col class="col-name"><col class="col-value"></colgroup>
    <tr class="propRow">
      <td class="propRowCol"></td>
      <td class="propRowCell cellName">Description</td>
      <td class="propRowCell">
        <input class="prop-input" [(ngModel)]="properties.description" [readonly]="readonly" (blur)="onSave()">
      </td>
    </tr>
    <tr class="propRow">
      <td class="propRowCol"></td>
      <td class="propRowCell cellName">Cyclic</td>
      <td class="propRowCell">
        <p-toggleswitch
          [(ngModel)]="properties.cyclic"
          [disabled]="readonly"
          (onChange)="onSave()">
        </p-toggleswitch>
      </td>
    </tr>
  </table>
}
