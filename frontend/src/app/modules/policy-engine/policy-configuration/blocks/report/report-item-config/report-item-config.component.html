<!-- Config Prop -->
@if (properties) {
  <table class="properties" [attr.readonly]="readonly">
  <colgroup><col class="col-toggle"><col class="col-name"><col class="col-value"></colgroup>
    <tr class="propHeader">
      <td class="propRowCol cellCollapse" (click)="onHide(propHidden, 'properties')" [attr.collapse]="propHidden.properties">
        <i class="pi pi-caret-down"></i>
      </td>
      <td class="propHeaderCell cellName">Properties</td>
      <td class="propHeaderCell"></td>
    </tr>
    <tr class="propRow" [attr.collapse]="propHidden.properties">
      <td class="propRowCol"></td>
      <td class="propRowCell cellName">Visible</td>
      <td class="propRowCell">
        <p-toggleswitch
          [(ngModel)]="properties.visible"
          [disabled]="readonly"
          (onChange)="onSave()">
        </p-toggleswitch>
      </td>
    </tr>
    <tr class="propRow" [attr.collapse]="propHidden.properties">
      <td class="propRowCol"></td>
      <td class="propRowCell cellName">Multiple</td>
      <td class="propRowCell">
        <p-toggleswitch
          [(ngModel)]="properties.multiple"
          [disabled]="readonly"
          (onChange)="onMultipleChange()">
        </p-toggleswitch>
      </td>
    </tr>
    <tr class="propRow" [attr.collapse]="propHidden.properties">
      <td class="propRowCol"></td>
      <td class="propRowCell cellName">Label</td>
      <td class="propRowCell">
        <input class="prop-input" [(ngModel)]="properties.uiMetaData.label" [readonly]="readonly" (blur)="onSave()">
      </td>
    </tr>
  </table>
}
