@if (properties) {
  <table class="properties" [attr.readonly]="readonly">
    <colgroup><col class="col-toggle"><col class="col-name"><col class="col-value"></colgroup>
    <tr class="propRow">
      <td class="propRowCol"></td>
      <td class="propRowCell cellName">Message</td>
      <td class="propRowCell">
        <input class="prop-input" [(ngModel)]="properties.message" [readonly]="readonly" (blur)="onSave()">
      </td>
    </tr>
    <tr class="propHeader" [attr.collapse]="propHidden.options">
      <td class="propRowCol" (click)="onHide(propHidden, 'options')">
        <i class="pi pi-caret-down"></i>
      </td>
      <td class="propHeaderCell cellName">Options</td>
      <td class="propHeaderCell"></td>
    </tr>
    @if (!propHidden.options) {
      <tr class="propRow">
        <td class="propRowCol"></td>
        <td class="propRowCell cellName">Skip save state</td>
        <td class="propRowCell">
          <p-toggleswitch
            [(ngModel)]="properties.skipSaveState"
            [disabled]="readonly">
          </p-toggleswitch>
        </td>
      </tr>
    }
  </table>
}
