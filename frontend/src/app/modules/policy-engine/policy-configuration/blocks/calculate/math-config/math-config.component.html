@if (properties) {
  <table class="properties" [attr.readonly]="readonly">
    <tr class="propRow">
      <td class="propRowCol"></td>
      <td class="propRowCell cellName">Expression</td>
      <td class="propRowCell">
        <button
          (click)="editExpression($event)"
          class="guardian-button guardian-button-secondary common-properties-button">
          <div class="guardian-button-label">Expression</div>
        </button>
      </td>
    </tr>
  </table>
}
