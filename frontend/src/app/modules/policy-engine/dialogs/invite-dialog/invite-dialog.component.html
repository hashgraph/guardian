<div class="g-dialog-content">
  <div class="g-dialog-header">
    <div class="g-dialog-title">
      {{ header }}
    </div>
    <div mat-dialog-actions>
      <div class="g-dialog-title-btn" (click)="onOk()">
        <i class="pi pi-times"></i>
      </div>
    </div>
  </div>
  <div class="g-dialog-body">
    @if (roles && roles.length) {
      <div class="link-content">
        <div class="p-fluid">
          <label for="roleDropdown">Role</label>
          <p-select
            id="roleDropdown"
            [(ngModel)]="role"
            [options]="roles"
            placeholder="Select a role"
            appendTo="body"
            >
          </p-select>
        </div>
        <div class="generate-btn" (click)="onInvite()">
          Generate invite
        </div>
      </div>
    }
    @if (invitation) {
      <div class="link-content">
        <input type="text" [value]="invitation" readonly>
        <div (click)="copyToClipboard(invitation)" class="link-btn">
          <i class="pi pi-link"></i>
          Copy invitation
        </div>
      </div>
    }
    @if (invitation) {
      <div class="link-content">
        <input type="text" [value]="link" readonly>
        <div (click)="copyToClipboard(invitation)" class="link-btn">
          <i class="pi pi-link"></i>
          Copy link
        </div>
      </div>
    }
  </div>
</div>
