<div #dialogHeader class="dialog-header">
  <div class="header-container">
    <div class="header-text">{{ title }}</div>
  </div>
  <div class="header-icon resize" (click)="toggleSize()" [title]="isLargeSize ? 'The size 50%' : 'The size 90%'">
    <i [class]="isLargeSize ? 'pi pi-window-minimize' : 'pi pi-window-maximize'"></i>
  </div>
  <div class="header-icon" (click)="onClose()">
    <svg-icon src="/assets/images/icons/close.svg" svgClass="icon-color-close"></svg-icon>
  </div>
</div>

<div class="dialog-body">
  <div class="group-container">
    <div class="group-header">Schemas</div>

    @if (!schemas.length) {
      <div class="field-container">
        <div class="field-value">No schemas to display</div>
      </div>
    }

    @if (schemas.length) {
      <div class="field-container master-select field-item">
        <label>
          <p-checkbox
            [binary]="true"
            [formControl]="master"
            inputId="select-all"
          ></p-checkbox>
          <span class="schema-name">Select all</span>
        </label>
      </div>
    }

    @if (schemas.length) {
      <div class="field-array">
        @for (s of schemas; track s; let i = $index) {
          <div class="field-item">
            <label>
              <p-checkbox
                [binary]="true"
                [formControl]="checks.at(i)"
                inputId="schema-{{ i }}"
              ></p-checkbox>
              <span class="schema-name">{{ s.name }}</span>
            </label>
            <p-button
              (click)="onOpenDocument(s)"
              label="Schema"
              icon="pi pi-align-right"
              class="schema-menu-btn"
              [outlined]="true"
              [pTooltip]="'View schema details'"
              tooltipPosition="bottom">
            </p-button>
          </div>
        }
      </div>
    }
  </div>
</div>

<div class="dialog-footer">
  <div class="action-buttons">
    <div class="dialog-button cancel-button">
      <button (click)="onClose()" class="guardian-button guardian-button-secondary">
        Close
      </button>
    </div>
    <div class="dialog-button">
      <button
        class="guardian-button guardian-button-primary"
        (click)="onSubmit()"
        [disabled]="schemas.length === 0"
        >
        Replace checked schemas
      </button>
    </div>
  </div>
</div>
