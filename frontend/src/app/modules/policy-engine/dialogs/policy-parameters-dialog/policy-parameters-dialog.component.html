<div #dialogHeader class="dialog-header">
    <div class="header-container">
        <div class="header-text">Policy Settings</div>
    </div>
    <div class="header-icon" (click)="onClose()">
        <svg-icon src="/assets/images/icons/close.svg" svgClass="icon-color-close"></svg-icon>
    </div>
</div>
<div class="dialog-body">
    <div class="context">
        <div *ngIf="loading" class="guardian-loading">
            <div class="guardian-loading-image"></div>
        </div>
        <div class="settings-warning">
            <i class="pi pi-info-circle"></i>
            <span>These settings will be used during policy execution. Please fill in all required fields where applicable.</span>
        </div>
        <div *ngFor="let item of items; let i = index"
            policy-parameter-property
            class="custom-properties"
            [block]="item.block"
            [property]="item.property"
            [config]="item.config"
            [readonly]="readonly"
            [control]="form.get(item.property.name)!"
            (update)="onSave()"
            >
        </div>
    </div>
</div>
<div class="dialog-footer">
    <div class="action-buttons">
        <div class="dialog-button">
            <button 
                (click)="onClose()" 
                class="guardian-button guardian-button-secondary">Cancel
            </button>
        </div>
        <div class="dialog-button">
            <button
                (click)="onSubmit()"
                [disabled]="form.invalid"
                class="guardian-button guardian-button-primary"> Apply Changes 
            </button>
        </div>
    </div>
</div>
