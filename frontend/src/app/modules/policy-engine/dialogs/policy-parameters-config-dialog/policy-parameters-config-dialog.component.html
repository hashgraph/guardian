<div #dialogHeader class="dialog-header">
  <div class="header-container">
    <div class="header-text">Policy Parameters</div>
  </div>
  <div class="header-icon" (click)="toggleSize()" [title]="isLargeSize ? 'The size 50%' : 'The size 90%'">
    <i [class]="isLargeSize ? 'pi pi-window-minimize' : 'pi pi-window-maximize'"></i>
  </div>
  <div class="header-icon" (click)="onClose()">
    <svg-icon src="/assets/images/icons/close.svg" svgClass="icon-color-close"></svg-icon>
  </div>
</div>
<div class="dialog-body">
  <div class="context">
    <form [formGroup]="form" (ngSubmit)="submit()" class="formgrid grid p-fluid">
      <div formArrayName="fields">
        @for (fg of fieldGroups; track trackByIndex(i, fg); let i = $index) {
          <div [formGroupName]="i">
            <div class="fields-grid group-container">
              <div class="field">
                <label class="parameter-label">Blocks</label>
                <select-block
                  class="parameter-dropdown"
                  [blocks]="currentBlocks"
                  [value]="fg.controls.blockTag.value"
                  (valueChange)="onBlockChange($event, i)"
                  [class.is-invalid]="fg.controls.blockTag.hasError('duplicateRow') || (fg.controls.blockTag.invalid && (fg.controls.blockTag.touched || submitted))"
                  [pTooltip]="fg.controls.blockTag.value || 'Pick the block whose property is being exposed'"
                  tooltipPosition="top"
                ></select-block>
              </div>
              <div class="field">
                <label class="parameter-label">Property</label>
                <p-select
                  placeholder="Select..."
                  formControlName="property"
                  class="parameter-dropdown"
                  [options]="propertiesOptions(i)"
                  optionLabel="label"
                  optionValue="path"
                  [showClear]="false"
                  aria-required="true"
                  [class.is-invalid]="fg.controls.property.hasError('duplicateRow') || (fg.controls.property.invalid && (fg.controls.property.touched || submitted))"
                  [pTooltip]="propertyLabel(fg, i) || 'Pick the block property the user may override'"
                  tooltipPosition="top"
                  >
                </p-select>
              </div>
              <div class="field">
                <label class="parameter-label">Visible</label>
                <p-multiSelect
                  formControlName="visible"
                  [options]="this.policyTemplate.policyRoles"
                  class="parameter-dropdown"
                  appendTo="body"
                  placeholder="Select..."
                  optionLabel="_name"
                  optionValue="_name"
                  filterBy="_name"
                  [class.is-invalid]="fg.controls.visible.hasError('duplicateRow') || (fg.controls.visible.invalid && (fg.controls.visible.touched || submitted))"
                  [pTooltip]="(fg.controls.visible.value || []).join(', ') || 'Roles that may see this parameter at runtime'"
                  tooltipPosition="top">
                </p-multiSelect>
              </div>
              <div class="field">
                <label class="parameter-label">Apply For </label>
                <p-multiSelect
                  placeholder="Select..."
                  formControlName="applyTo"
                  class="parameter-dropdown"
                  [options]="applyToOptions"
                  appendTo="body"
                  optionLabel="_name"
                  optionValue="_name"
                  filterBy="_name"
                  [showToggleAll]="false"
                  [pTooltip]="(fg.controls.applyTo.value || []).join(', ') || 'Scope the override applies to: All users, only Self, or specific roles'"
                  tooltipPosition="top"
                  >
                </p-multiSelect>
              </div>
              @if (!readonly) {
                <div class="delete-field">
                  <button
                    class="guardian-icon-button big"
                    (click)="$event.preventDefault(); removeField(i)"
                    >
                    <svg-icon
                      class="icon-btn svg-icon"
                      src="/assets/images/icons/delete.svg"
                      svgClass='icon-color-delete'>
                    </svg-icon>
                  </button>
                </div>
              }
              <div class="field label-field">
                <label for="label" class="parameter-label">Label</label>
                <input placeholder="Please enter a label here" id="label" pInputText formControlName="label">
              </div>
              <div class="field description-field">
                <label for="shortDescription" class="parameter-label">Short Description</label>
                <input placeholder="Please enter a short description here" id="shortDescription" pInputText formControlName="shortDescription">
              </div>
              <div class="required-field">
                <p-checkbox
                  formControlName="required"
                  [binary]="true"
                  inputId="required">
                </p-checkbox>
                <label for="required">Set as required</label>
                @if (fg.controls.blockTag.hasError('duplicateRow')) {
                  <small class="duplicate-row-error">
                    Duplicates another row with the same Block, Property and Visible.
                  </small>
                }
              </div>
            </div>
          </div>
        }
      </div>
    </form>
    @if (!readonly) {
      <button (click)="addField()" class="add-button dialog-button guardian-button guardian-button-secondary add-doc-btn">
        <div class="guardian-button-icon">
          <svg-icon class="icon-btn svg-icon-16" src="/assets/images/icons/16/add.svg"
            svgClass="icon-color-primary">
          </svg-icon>
        </div>
        <div class="guardian-button-label">Add Field</div>
      </button>
    }
  </div>
</div>
<div class="dialog-footer">
  <div class="action-buttons">
    <div class="dialog-button">
      <button
        (click)="onClose()"
      class="guardian-button guardian-button-secondary">Cancel</button>
    </div>
    @if (!readonly) {
      <div class="dialog-button">
        <button
          (click)="submit()"
          [disabled]="form.invalid"
          class="guardian-button guardian-button-primary"> Apply Changes
        </button>
      </div>
    }
  </div>
</div>
