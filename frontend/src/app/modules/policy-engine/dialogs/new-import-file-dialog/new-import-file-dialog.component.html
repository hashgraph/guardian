<div class="dialog-body">
  <div class="context">
    @if (loading) {
      <div class="loading">
        <div class="preloader-image preloader-image-l-size"></div>
      </div>
    }

    <app-file-drag-n-drop
      class="drag-n-drop"
      [multiple]="multiple"
      [fileExtension]="fileExtension"
      (onFileLoaded)="importFromFile($event)"
    [dropZoneLabel]="label"></app-file-drag-n-drop>

  </div>
</div>
