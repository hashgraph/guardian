@if (!multiple) {
  <p-select
    dataKey="id"
    [(ngModel)]="selectedOption"
    optionValue="value"
    [options]="searchData"
    [disabled]="readonly"
    [filter]="false"
    filterPlaceholder="Search..."
    placeholder="Select..."
    appendTo="body"
    class="guardian-dropdown"
    panelStyleClass="guardian-dropdown-panel"
    >
    <ng-template pTemplate="selectedItem" let-item>
      <span class="custom">{{ item ? item.name : 'Select...' }}</span>
    </ng-template>
    <ng-template pTemplate="header">
      <div class="components-search">
        <input
          type="text"
          placeholder="Search"
          [(ngModel)]="search"
          (input)="onSearch($event)"
          style="height: 32px;"
          />
        <i class="pi pi-search components-search-icon"></i>
      </div>
    </ng-template>
    <ng-template let-item pTemplate="item">
      <div class="block-name" [ngClass]="{'empty-option': !item.value}" [attr.root]="item.root">
        @if (item.svg && item.name) {
          <div class="block-icon">
            <i [ngClass]="'pi pi-' + item.icon" class="svg-icon"></i>
          </div>
        }
        @if (!item.svg && item.icon && item.name) {
          <div class="block-icon">
            <i [ngClass]="'pi pi-' + item.icon"></i>
          </div>
        }
        {{ item.name || '' }}
      </div>
    </ng-template>
  </p-select>
}

@if (multiple) {
  <p-multiSelect
    dataKey="id"
    [(ngModel)]="selectedOption"
    optionValue="value"
    [options]="searchData"
    [disabled]="readonly"
    [filter]="false"
    [displaySelectedLabel]="false"
    placeholder="Select"
    appendTo="body"
    class="guardian-multiselect"
    panelStyleClass="guardian-multiselect-panel policy-select-block"
    >
    <ng-template pTemplate="header">
      <div class="components-search">
        <input
          type="text"
          placeholder="Search"
          [(ngModel)]="search"
          (input)="onSearch($event)"
          />
        <i class="pi pi-search components-search-icon"></i>
      </div>
    </ng-template>
    <ng-template let-item pTemplate="item">
      <div class="block-name" [attr.root]="item.root">
        @if (item.svg) {
          <div class="block-icon">
            <i [ngClass]="'pi pi-' + item.icon" class="svg-icon"></i>
          </div>
        }
        @if (!item.svg) {
          <div class="block-icon">
            <i [ngClass]="'pi pi-' + item.icon"></i>
          </div>
        }
        {{ item.name }}
      </div>
    </ng-template>
    <ng-template pTemplate="selectedItems">
      <span class="custom">{{ text }}</span>
    </ng-template>
  </p-multiSelect>
}
