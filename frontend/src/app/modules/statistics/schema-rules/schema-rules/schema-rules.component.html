<div class="guardian-page">
    <div *ngIf="loading" class="guardian-loading">
        <div class="guardian-loading-image"></div>
    </div>

    <div *ngIf="!isConfirmed" class="guardian-user-not-registered">
        Before starting work you need to get DID
        <a [routerLink]="['/profile']">here</a>
    </div>

    <div class="guardian-user-page-header">
        <span>{{title}}</span>
    </div>

    <div class="actions-container">
        <div class="dropdown-block">
            <p-select
                (onChange)="onFilter($event)"
                [(ngModel)]="currentPolicy"
                [options]="allPolicies"
                [showClear]="false"
                placeholder="Select Policy">
                <ng-template pTemplate="selectedItem">
                    <div *ngIf="currentPolicy && currentPolicy.instanceTopicId">
                        <span class="dropdown-label">Policy</span>
                        <span class="dropdown-item">{{ currentPolicy.name }}</span>
                    </div>
                    <div *ngIf="!currentPolicy || !currentPolicy.instanceTopicId">
                        <span class="dropdown-label">Policy</span>
                        <span class="dropdown-item">All</span>
                    </div>
                </ng-template>
                <ng-template let-policy pTemplate="item">
                    <div *ngIf="policy.instanceTopicId" class="dropdown-item">
                        <span>{{policy.name}}</span>
                        <span class="dropdown-policy-version">({{policy.version}})</span>
                    </div>
                    <div *ngIf="!policy.instanceTopicId" class="dropdown-item">
                        <span>All</span>
                    </div>
                </ng-template>
            </p-select>
        </div>
        <div class="module-actions-buttons-container">
            <p-button
                *ngIf="user.SCHEMAS_RULE_CREATE"
                (click)="onCreate()"
                class="toolbar-btn-primary">
                <svg-icon class="icon-btn svg-icon"
                    src="/assets/images/icons/add.svg"
                    svgClass="icon-color-secondary">
                </svg-icon>
                <span>Create New</span>
            </p-button>

            <p-button
                *ngIf="user.SCHEMAS_RULE_CREATE"
                (click)="onImport()"
                class="toolbar-btn-primary">
                <svg-icon class="icon-btn svg-icon"
                    src="/assets/images/icons/import.svg"
                    svgClass="icon-color-secondary">
                </svg-icon>
                <span>Import</span>
            </p-button>
        </div>
    </div>

    <div class="guardian-user-page-grid">
        <ng-container *ngIf="page && page.length > 0; else noData">
            <div class="guardian-grid-container">
                <p-table
                    class="guardian-grid-table"
                    [value]="page"
                    [scrollable]="true"
                >
                    <ng-template pTemplate="header">
                        <tr class="guardian-grid-header">
                            <ng-container *ngFor="let column of columns">
                                <th
                                    *ngIf="!column.canDisplay || column.canDisplay()"
                                    class="header-cell-{{column.type}} col-{{column.size}}"
                                    >{{column.title}}</th>
                            </ng-container>
                        </tr>
                    </ng-template>
                    <ng-template let-row pTemplate="body">
                        <tr class="guardian-grid-row">
                            <ng-container *ngFor="let column of columns">
                                <td
                                    *ngIf="!column.canDisplay || column.canDisplay()"
                                    class="row-cell-{{column.type}} col-{{column.size}}"
                                    pTooltip="{{row[column.id]}}"
                                    [tooltipDisabled]="!column.tooltip"
                                    tooltipPosition="top"
                                    [showDelay]="1000"
                                    [ngSwitch]="column.id"
                                >
                                    <ng-container *ngSwitchCase="'status'">
                                        <guardian-switch-button
                                            [(value)]="row.status"
                                            onValue="ACTIVE"
                                            offValue="DRAFT"
                                            onLabel="Active"
                                            offLabel="Inactive"
                                            (onChange)="onActive($event, row)"
                                        ></guardian-switch-button>
                                    </ng-container>
                                    <ng-container *ngSwitchCase="'edit'">
                                        <div
                                            class="guardian-icon-button big"
                                            (click)="onEdit(row)">
                                            <svg-icon
                                                class="icon-btn"
                                                src="/assets/images/icons/edit.svg"
                                                [svgClass]="'icon-color-primary'">
                                            </svg-icon>
                                        </div>
                                    </ng-container>
                                    <ng-container *ngSwitchCase="'export'">
                                        <div
                                            class="guardian-icon-button big"
                                            (click)="onExport(row)">
                                            <svg-icon
                                                class="icon-btn"
                                                src="/assets/images/icons/export.svg"
                                                [svgClass]="'icon-color-primary'">
                                            </svg-icon>
                                        </div>
                                    </ng-container>
                                    <ng-container *ngSwitchCase="'delete'">
                                        <div
                                            [attr.disabled]="row.status === 'ACTIVE'"
                                            class="guardian-icon-button big"
                                            (click)="onDelete(row)">
                                            <svg-icon
                                                class="icon-btn"
                                                src="/assets/images/icons/delete.svg"
                                                [svgClass]="row.status === 'ACTIVE' ? 'icon-color-disabled' : 'icon-color-delete'">
                                            </svg-icon>
                                        </div>
                                    </ng-container>
                                    <ng-container *ngSwitchDefault>
                                        <span class="text-truncate">{{row[column.id]}}</span>
                                    </ng-container>
                                </td>
                            </ng-container>
                        </tr>
                    </ng-template>
                </p-table>
                <div class="guardian-grid-paginator">
                    <app-paginator
                        class="guardian-grid-paginator"
                        [pageIndex]="pageIndex"
                        [pageSize]="pageSize"
                        [length]="pageCount"
                        (page)="onPage($event)"
                    ></app-paginator>
                </div>
            </div>
        </ng-container>
        <ng-template #noData>
            <div class="guardian-user-not-data">
                <svg-icon
                    class="svg-icon-32"
                    src="/assets/images/icons/32/list.svg"
                    svgClass="icon-color-disabled"></svg-icon>
                <span class="guardian-user-not-data__text-strong">There are no rules created yet</span>
                <span class="guardian-user-not-data__text">Please create a new rule to see the data</span>
            </div>
        </ng-template>
    </div>
</div>
