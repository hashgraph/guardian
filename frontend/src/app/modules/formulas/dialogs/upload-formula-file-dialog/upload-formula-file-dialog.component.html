<div class="dialog-header">
  <div class="header-container">
    <div class="header-text">Upload file</div>
  </div>
  <div class="header-icon" (click)="onClose()">
    <svg-icon src="/assets/images/icons/close.svg" svgClass="icon-color-close"></svg-icon>
  </div>
</div>
<div class="dialog-body">
  <div class="context">

    @if (loading) {
      <div class="guardian-loading">
        <div class="guardian-loading-image"></div>
      </div>
    }

    <p-tabs class="guardian-tabs action-tabs" [(value)]="tabIndex" (valueChange)="setImportType($event)">
      <p-tablist>
        @for (tab of items; track tab; let i = $index) {
          <p-tab [value]="i"><div class="tabview-label">{{ tab.label }}</div></p-tab>
        }
      </p-tablist>
    </p-tabs>

    <div class="form-container">

      @if (importType === 'file' && step === 0) {
        <app-file-drag-n-drop
          (onFileLoaded)="importFromFile($event)"
          [dropZoneLabel]="placeholder"
          [fileExtension]="fileExtension"
        ></app-file-drag-n-drop>
      }
      @if (importType === 'file' && step === 1) {
        <form  [formGroup]="dataForm">
          <div class="guardian-input-container">
            <label class="form-label" htmlFor="version">* Name</label>
            <input
              id="timestamp"
              formControlName="name"
              placeholder="File name"
              pInputText
              type="text"/>
          </div>
          <div class="guardian-input-container">
            <label class="form-label" htmlFor="version">* URL</label>
            <input
              id="timestamp"
              formControlName="url"
              placeholder="URL"
              pInputText
              type="text"/>
          </div>
        </form>
      }
      @if (importType === 'url') {
        <form  [formGroup]="dataForm">
          <div class="guardian-input-container">
            <label class="form-label" htmlFor="version">* Name</label>
            <input
              id="timestamp"
              formControlName="name"
              placeholder="File name"
              pInputText
              type="text"/>
          </div>
          <div class="guardian-input-container">
            <label class="form-label" htmlFor="version">* URL</label>
            <input
              id="timestamp"
              formControlName="url"
              placeholder="URL"
              pInputText
              type="text"/>
          </div>
        </form>
      }

    </div>

  </div>
</div>
<div class="dialog-footer">
  <div class="action-buttons">
    <div class="dialog-button">
      <button
        (click)="onClose()"
      class="guardian-button guardian-button-secondary">Close</button>
    </div>
    <div class="dialog-button">
      <button
        (click)="onSubmit()"
        class="guardian-button guardian-button-primary"
      [disabled]="dataForm.invalid">Upload</button>
    </div>
  </div>
</div>
