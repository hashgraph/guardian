<app-common-dialog [loading]="loading" [confirmVisible]="false" cancelLabel="Close" title="Wiper requests"
  bodyMaxHeight="740px"
  (cancel)="onNoClick()" (close)="onNoClick()">
  @if (requests.length) {
    <div class="requests">
      @for (request of requests; track request) {
        <div class="request">
          <div class="profile">
            <i class="pi pi-user profile__icon"></i>
            <span class="profile__id">{{ request.user }}</span>
          </div>
          <div class="tokens">
            @if (version !== '1.0.0') {
              <div class="token-card">
                <div class="token-card__row">
                  <span class="token-card__label">TOKEN</span>
                  <span class="token-card__value">{{ request.token }}</span>
                </div>
              </div>
            }
          </div>
          <div class="request__actions">
            <button type="button"
              class="btn btn--approve"
              (click)="approveRequest(request.id)"
              [disabled]="!hasPermissions(contract.permissions, 2)"
              [pTooltip]="'You are not manager'"
              tooltipStyleClass="guardian-tooltip"
              [tooltipDisabled]="hasPermissions(contract.permissions, 2)">
              Approve
            </button>
            <button type="button"
              class="btn btn--reject"
              (click)="rejectRequest(request.id)"
              [disabled]="!hasPermissions(contract.permissions, 2)"
              [pTooltip]="'You are not manager'"
              tooltipStyleClass="guardian-tooltip"
              [tooltipDisabled]="hasPermissions(contract.permissions, 2)">
              Reject
            </button>
            <button type="button"
              class="btn btn--ban"
              (click)="rejectRequest(request.id, true)"
              [disabled]="!hasPermissions(contract.permissions, 2)"
              [pTooltip]="'You are not manager'"
              tooltipStyleClass="guardian-tooltip"
              [tooltipDisabled]="hasPermissions(contract.permissions, 2)">
              Ban
            </button>
          </div>
        </div>
      }
    </div>

    <app-paginator
      [length]="length"
      [pageIndex]="pageIndex"
      [pageSize]="pageSize"
      (page)="onPage($event)">
    </app-paginator>
  } @else {
    <div class="no-requests">
      <i class="pi pi-list no-requests__icon"></i>
      <span class="no-requests__label">Contract has no requests, try to sync.</span>
    </div>
  }
</app-common-dialog>
