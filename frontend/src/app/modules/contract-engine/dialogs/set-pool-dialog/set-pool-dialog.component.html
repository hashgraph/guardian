<app-common-dialog
  title="Set Pool"
  confirmLabel="Set"
  cancelLabel="Cancel"
  [confirmDisabled]="loading || !form.valid"
  (confirm)="onCreate()"
  (cancel)="onNoClick()"
  (close)="onNoClick()">
  <form class="set-pool" [formGroup]="form">
    <div class="set-pool__header">
      <p-checkbox
        [binary]="true"
        [formControl]="immediately"
        inputId="withoutApproval"
      ></p-checkbox>
      <label class="p-checkbox-label" for="withoutApproval">Without approval</label>
    </div>

    <div class="set-pool__rows" formArrayName="tokens">
      @for (tokenControl of tokenControls; track tokenControl; let i = $index) {
        <div class="token-row" [formGroupName]="i">
          <div class="token-row__field token-row__field--token">
            <label for="token-{{ i }}">Token</label>
            <p-select
              id="token-{{ i }}"
              formControlName="token"
              [options]="getTokenList(tokenControl?.value?.token?.tokenId || '')"
              optionLabel="tokenSymbol"
              placeholder="Token"
              [required]="true"
              [appendTo]="'body'"
              [style]="{ width: '100%' }"
              >
              <ng-template let-option pTemplate="selectedItem">
                {{ option.tokenSymbol }} ({{ option.tokenId }})
              </ng-template>
              <ng-template let-option pTemplate="item">
                {{ option.tokenSymbol }} ({{ option.tokenId }})
              </ng-template>
            </p-select>
          </div>
          <div class="token-row__field token-row__field--count">
            <label for="count-{{ i }}">Count</label>
            <p-inputNumber
              id="count-{{ i }}"
              formControlName="count"
              [placeholder]="'Count'"
              mode="decimal"
              [min]="1"
              [useGrouping]="false"
              [showButtons]="true"
              [step]="1"
              [style]="{ width: '100%' }"
            ></p-inputNumber>
          </div>
          <button type="button"
            class="trash-btn"
            (click)="removeToken(i)"
            aria-label="Remove token">
            <i class="pi pi-trash"></i>
          </button>
        </div>
      }

      @if (tokens.controls && tokens.controls.length < 2) {
        <button
          type="button"
          pButton
          icon="pi pi-plus"
          label="Add"
          class="add-token-custom"
          (click)="addToken()">
        </button>
      }
    </div>
  </form>
</app-common-dialog>
