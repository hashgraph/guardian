
@if (formModel) {
  <div class="type-selector">
    <label for="maxcc">Maxcc</label>
    <input id="maxcc" type="number" pInputText [formControl]="formModel.getControlByName('maxcc')" required />
  </div>
}
@if (formModel) {
  <div class="type-selector">
    <label for="width">Width</label>
    <input id="width" type="number" pInputText [formControl]="formModel.getControlByName('width')" required />
  </div>
}
@if (formModel) {
  <div class="type-selector">
    <label for="height">Height</label>
    <input id="height" type="number" pInputText [formControl]="formModel.getControlByName('height')" required />
  </div>
}
@if (formModel) {
  <div class="type-selector">
    <label for="bbox">BBox</label>
    <input id="bbox" type="text" pInputText [formControl]="formModel.getControlByName('bbox')"
      required placeholder="11111,22222,33333,44444" pattern="\d+,\d+,\d+,\d+" />
  </div>
}
<div class="type-selector">
  <label for="from">From</label>
  <p-datepicker #dateFrom id="from" [formControl]="fromControl" [showTime]="false" appendTo="body"></p-datepicker>
</div>
<div class="type-selector">
  <label for="to">To</label>
  <p-datepicker #dateTo id="to" [formControl]="toControl" [showTime]="false" appendTo="body"></p-datepicker>
</div>
@if (formattedImageLink) {
  <img [src]="formattedImageLink" class="image" />
}
