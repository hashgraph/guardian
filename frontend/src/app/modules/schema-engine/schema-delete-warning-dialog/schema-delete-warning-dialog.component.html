<div class="dialog-header">
  <div class="header-container">
    <i class="pi pi-exclamation-triangle warning-icon"></i><div class="header-text">{{ header }}</div>
  </div>
  <div class="header-icon" (click)="onClick()">
    <svg-icon src="/assets/images/icons/close.svg" svgClass="icon-color-close"></svg-icon>
  </div>
</div>

<div class="dialog-body">
  @if (loading) {
    <div class="loading">
      <div class="preloader-image preloader-image-l-size"></div>
    </div>
  }

  <div class="warning-text">{{ text }}</div>

  @for (item of warningItems; track item) {
    <p class="warning-item">
      {{ item }}
    </p>
  }
</div>

<div class="dialog-footer">
  <div class="action-buttons">
    @for (button of buttons; track button) {
      <div class="{{button.class}}-button">
        <button
          (click)="onClick(button)"
        class="guardian-button guardian-button-{{button.class}}">{{button.name}}</button>
      </div>
    }
  </div>
</div>
