<p-drawer
  [visible]="open"
  (visibleChange)="firstSteps.setOpen($event)"
  position="right"
  [modal]="false"
  [dismissible]="false"
  [showCloseIcon]="false"
  styleClass="first-steps-drawer">
  <ng-template pTemplate="headless">
    <aside class="first-steps-panel">
      <div class="first-steps-resize" (mousedown)="onResizeStart($event)" title="Drag to resize"></div>
      <div class="first-steps-header">
        <div class="first-steps-heading">
          <h2 class="first-steps-title">First Steps</h2>
          <p class="first-steps-subtitle">A quick tutorial to get you started with Guardian.</p>
        </div>
        <button type="button" class="first-steps-disable" (click)="disable()">Disable</button>
      </div>

      @if (loadFailed) {
        <p class="first-steps-error">
          First Steps content isn't available. The page should be present under
          <code>frontend/src/assets/first-steps/</code> — copy it from <code>docs/first-steps/</code> and
          rebuild.
        </p>
      } @else {
        <div class="first-steps-content" [innerHTML]="contentHtml"></div>
      }
    </aside>
  </ng-template>
</p-drawer>
