<div class="guardian-page">
    <ng-container [ngTemplateOutlet]="header"></ng-container>
    <div class="actions-container">
        <div class="dropdown-block">
            <p-select
                (onChange)="onFilter($event)"
                [options]="statuses"
                [(ngModel)]="currentStatus"
                optionLabel="name"
                optionValue="value"
                appendTo="body"
                class="guardian-dropdown"
                placeholder="Status"
            ></p-select>
        </div>
    </div>
    <ng-container *ngIf="!loading">
        <ng-container [ngTemplateOutlet]="tableContainer"></ng-container>
    </ng-container>
    <div *ngIf="loading" class="loading">
        <div class="preloader-image preloader-image-l-size"></div>
    </div>
</div>

<ng-template #header>
    <div class="guardian-user-page-header">Worker Tasks</div>
</ng-template>

<ng-template #tableContainer>
    <ng-container *ngIf="workerTasks && workerTasks.length > 0 else noData">
        <div class="table-container">
            <div class="guardian-grid-container">
                <p-table
                    [value]="workerTasks"
                    class="guardian-grid-table"
                    [scrollable]="true"
                >
                    <ng-template pTemplate="header">
                        <tr class="guardian-grid-header">
                            <th class="header-cell-text" style="min-width: 200px; width: 200px;">Created</th>
                            <th class="header-cell-text" style="min-width: 200px; width: 200px;">Started</th>
                            <th class="header-cell-text" style="min-width: 250px;">Type</th>
                            <th class="header-cell-text" style="min-width: 200px; width: 200px;">Status</th>
                            <th class="header-cell-text" style="min-width: 250px;">Comments</th>
                            <th class="header-cell-text" style="min-width: 140px; width: 140px;"></th>
                        </tr>
                    </ng-template>

                    <ng-template let-task pTemplate="body">
                        <tr class="guardian-grid-row">
                            <td class="row-cell-text" style="min-width: 200px; width: 200px;">
                                <span class="text-truncate">{{ task.createDate | date: 'yyyy-MM-dd h:mm a' }}</span>
                            </td>
                            <td class="row-cell-text" style="min-width: 200px; width: 200px;">
                                <span class="text-truncate">
                                    <ng-container *ngIf="task.processedTime">{{ task.processedTime | date: 'yyyy-MM-dd h:mm a' }}</ng-container>
                                    <ng-container *ngIf="!task.processedTime">Not started yet</ng-container>
                                </span>
                            </td>
                            <td class="row-cell-text" style="min-width: 250px;" pTooltip="{{ task.type }}" tooltipPosition="top">
                                <span class="text-truncate">{{ task.type }}</span>
                            </td>
                            <td class="row-cell-text" style="min-width: 200px; width: 200px;">
                                <span class="text-truncate">{{ task.status }}</span>
                            </td>
                            <td class="row-cell-text" style="min-width: 250px;" pTooltip="{{ task.errorReason }}" [tooltipDisabled]="task.status !== 'ERROR'" tooltipPosition="top">
                                <span *ngIf="task.status === 'ERROR'" class="text-truncate">{{ task.errorReason }}</span>
                            </td>
                            <td class="row-cell-text" style="min-width: 140px; width: 140px;">
                                <div class="operations-container">
                                    <button
                                        *ngIf="user.WORKER_TASKS_EXECUTE"
                                        (click)="restartTask(task)"
                                        [disabled]="!(task.isError && task.isRetryableTask)"
                                        class="p-button-raised p-button-rounded p-button-text"
                                        icon="pi pi-undo"
                                        pButton type="button"></button>
                                    <button
                                        *ngIf="user.WORKER_TASKS_DELETE"
                                        (click)="deleteTask(task)"
                                        [disabled]="!task.isError"
                                        class="p-button-raised p-button-rounded p-button-text"
                                        icon="pi pi-minus"
                                        pButton
                                        type="button"></button>
                                </div>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>

                <div class="guardian-grid-paginator">
                    <app-paginator
                        (page)="onPage($event)"
                        [length]="workerTasksCount"
                        [pageIndex]="pageIndex"
                        [pageSize]="pageSize"
                    ></app-paginator>
                </div>
            </div>
        </div>
    </ng-container>
</ng-template>

<ng-template #noData>
    <div class="not-exist">
        <svg-icon class="svg-icon-32" src="/assets/images/icons/32/list.svg" svgClass="disabled-color">
        </svg-icon>
        <span class="info-text-strong">No active tasks</span>
        <span class="info-text"></span>
    </div>
</ng-template>
