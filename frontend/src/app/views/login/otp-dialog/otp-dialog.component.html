<div class="dialog-body">
    <form [formGroup]="form">
        <div class="form-input-container">
            <div class="message">Enter the verification code generated by your mobile application.</div>
        </div>

        <div class="form-input-container">
            <label class="p-field-label" for="login">Code</label>
            <input class="p-field-input code-input" minlength="6" maxlength="6" formControlName="token" id="token"
                pInputText placeholder="Enter a Code" type="text" />
        </div>
    </form>
</div>
<div class="dialog-footer">
    <div class="action-buttons">
        <button (click)="onChange()" [disabled]="form.invalid" class="button" label="Verify Code" pButton></button>
        <button (click)="onNoClick()" class="button secondary" label="Cancel" pButton></button>
    </div>
</div>
